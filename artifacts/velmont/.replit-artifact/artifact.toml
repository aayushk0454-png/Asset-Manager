kind = "web"
previewPath = "/"
title = "VELMONT"
version = "1.0.0"
id = "artifacts/velmont"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24958

[services.development]
run = "pnpm --filter @workspace/velmont run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/velmont", "run", "build" ]
serve = "static"
publicDir = "artifacts/velmont/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24958"
BASE_PATH = "/"
